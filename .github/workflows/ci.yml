---
name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.25.4
      - run: go mod download
      - run: go test ./...
      - run: go vet ./...
      - run: go build -o bin/vw ./cmd/vw
